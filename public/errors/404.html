<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Not Found</title>
  <style>
    :root {
      --bg:    #050e18;
      --cyan:  #00d4ff;
      --green: #00ff9d;
      --red:   #ff4466;
      --dim:   #2a5a70;
      --text:  #8bbfcf;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,68,102,0.012) 2px,
        rgba(255,68,102,0.012) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .glitch-wrap {
      position: relative;
      text-align: center;
      animation: fadeIn .8s ease both;
    }

    .error-code {
      font-size: clamp(5rem, 18vw, 10rem);
      font-weight: 400;
      color: var(--red);
      letter-spacing: .05em;
      text-shadow: 0 0 40px #ff446644;
      line-height: 1;
      position: relative;
    }

    /* glitch layers */
    .error-code::before,
    .error-code::after {
      content: '404';
      position: absolute;
      top: 0; left: 0;
      width: 100%;
    }
    .error-code::before {
      color: var(--cyan);
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
      animation: glitch1 3s infinite;
      opacity: .5;
    }
    .error-code::after {
      color: var(--green);
      clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
      animation: glitch2 3s infinite;
      opacity: .5;
    }

    @keyframes glitch1 {
      0%,90%,100% { transform: translateX(0); }
      92% { transform: translateX(-4px); }
      94% { transform: translateX(4px); }
      96% { transform: translateX(-2px); }
    }
    @keyframes glitch2 {
      0%,88%,100% { transform: translateX(0); }
      90% { transform: translateX(4px); }
      93% { transform: translateX(-4px); }
      96% { transform: translateX(2px); }
    }

    .content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      z-index: 1;
    }

    .badge {
      font-size: .6rem;
      letter-spacing: .25em;
      color: var(--dim);
      animation: fadeIn .8s .2s ease both;
    }

    .message {
      font-size: .82rem;
      opacity: .65;
      letter-spacing: .06em;
      max-width: 340px;
      line-height: 1.8;
      animation: fadeIn .8s .3s ease both;
    }

    .back-link {
      margin-top: .5rem;
      font-size: .65rem;
      letter-spacing: .2em;
      color: var(--cyan);
      text-decoration: none;
      border: 1px solid var(--dim);
      padding: .5rem 1.2rem;
      transition: border-color .3s, box-shadow .3s;
      animation: fadeIn .8s .45s ease both;
    }
    .back-link:hover {
      border-color: var(--cyan);
      box-shadow: 0 0 14px #00d4ff33;
    }

    .terminal-line {
      font-size: .62rem;
      letter-spacing: .15em;
      color: var(--dim);
      animation: fadeIn .8s .6s ease both;
    }
    .terminal-line span { color: var(--red); }

    @keyframes fadeIn {
      from { opacity:0; transform: translateY(12px); }
      to   { opacity:1; transform: none; }
    }

    footer {
      position: fixed;
      bottom: 1.2rem;
      font-size: .65rem;
      letter-spacing: .15em;
      color: var(--dim);
      z-index: 1;
    }

    .corner { position: fixed; width: 30px; height: 30px; z-index: 2; }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--red); opacity: .4; }
    .corner::before { width: 100%; height: 1px; top:0; left:0; }
    .corner::after  { width: 1px; height: 100%; top:0; left:0; }
    .tl { top:1rem; left:1rem; }
    .tr { top:1rem; right:1rem; transform: scaleX(-1); }
    .bl { bottom:1rem; left:1rem; transform: scaleY(-1); }
    .br { bottom:1rem; right:1rem; transform: scale(-1); }
  </style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="content">
  <div class="glitch-wrap">
    <div class="error-code">404</div>
  </div>

  <span class="badge">// ERRORE — RISORSA NON TROVATA</span>

  <p class="message">
    Il path richiesto non corrisponde a nessuna route
    configurata nel server. La pagina potrebbe essere
    stata rimossa o non essere mai esistita.
  </p>

  <a class="back-link" href="/">← TORNA ALLA HOME</a>

  <span class="terminal-line">
    STATUS <span>404</span> — NOT FOUND
  </span>
</div>

<footer id="clock">--:--:--</footer>

<script>
  (function tick() {
    document.getElementById('clock').textContent =
      new Date().toTimeString().slice(0, 8);
    setTimeout(tick, 1000);
  })();
</script>
</body>
</html>
