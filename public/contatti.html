<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contatti — Python TCP Server</title>
  <style>
    :root {
      --bg:    #050e18;
      --cyan:  #00d4ff;
      --green: #00ff9d;
      --dim:   #2a5a70;
      --text:  #8bbfcf;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,212,255,0.015) 2px,
        rgba(0,212,255,0.015) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    nav {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 2rem;
      z-index: 10;
      font-size: .65rem;
      letter-spacing: .2em;
    }
    nav a { color: var(--dim); text-decoration: none; transition: color .3s; }
    nav a:hover, nav a.active { color: var(--cyan); text-shadow: 0 0 10px #00d4ff88; }

    .content {
      position: relative;
      z-index: 1;
      max-width: 560px;
      width: 90%;
      padding: 6rem 0 4rem;
    }

    .badge {
      font-size: .6rem;
      letter-spacing: .25em;
      color: var(--dim);
      margin-bottom: 1rem;
      display: block;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 400;
      color: var(--cyan);
      letter-spacing: .1em;
      text-shadow: 0 0 20px #00d4ff44;
      margin-bottom: 2.5rem;
      animation: fadeIn .8s ease both;
    }
    h1 span { color: var(--green); text-shadow: 0 0 20px #00ff9d44; }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 1.2rem;
      margin-bottom: 1.8rem;
      animation: fadeIn .8s ease both;
    }
    .contact-item:nth-child(3) { animation-delay: .15s; }
    .contact-item:nth-child(4) { animation-delay: .3s; }
    .contact-item:nth-child(5) { animation-delay: .45s; }

    .contact-icon {
      width: 36px;
      height: 36px;
      border: 1px solid var(--dim);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--green);
      font-size: .75rem;
      flex-shrink: 0;
      transition: border-color .3s, box-shadow .3s;
    }
    .contact-item:hover .contact-icon {
      border-color: var(--green);
      box-shadow: 0 0 12px #00ff9d33;
    }

    .contact-info .label {
      font-size: .58rem;
      letter-spacing: .2em;
      color: var(--dim);
      margin-bottom: .25rem;
    }
    .contact-info .value {
      font-size: .82rem;
      color: var(--text);
      opacity: .85;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, var(--dim), transparent);
      margin: 2rem 0;
      opacity: .4;
    }

    .status-line {
      font-size: .65rem;
      letter-spacing: .15em;
      color: var(--dim);
      display: flex;
      align-items: center;
      gap: .6rem;
      animation: fadeIn .8s .5s ease both;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: blink 2s ease infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }

    @keyframes fadeIn {
      from { opacity:0; transform: translateY(16px); }
      to   { opacity:1; transform: none; }
    }

    footer {
      position: fixed;
      bottom: 1.2rem;
      font-size: .65rem;
      letter-spacing: .15em;
      color: var(--dim);
      z-index: 1;
    }

    .corner { position: fixed; width: 30px; height: 30px; z-index: 2; }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--cyan); }
    .corner::before { width: 100%; height: 1px; top:0; left:0; }
    .corner::after  { width: 1px; height: 100%; top:0; left:0; }
    .tl { top:1rem; left:1rem; }
    .tr { top:1rem; right:1rem; transform: scaleX(-1); }
    .bl { bottom:1rem; left:1rem; transform: scaleY(-1); }
    .br { bottom:1rem; right:1rem; transform: scale(-1); }
  </style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<nav>
  <a href="/">HOME</a>
  <a href="/about">ABOUT</a>
  <a href="/contatti" class="active">CONTATTI</a>
</nav>

<div class="content">
  <span class="badge">// CONTATTI — ZORDAN FILIPPO</span>
  <h1>CONTACT<span>.</span></h1>

  <div class="contact-item">
    <div class="contact-icon">@</div>
    <div class="contact-info">
      <div class="label">// EMAIL</div>
      <div class="value">filippo.zordan@email.com</div>
    </div>
  </div>

  <div class="contact-item">
    <div class="contact-icon">&lt;/&gt;</div>
    <div class="contact-info">
      <div class="label">// GITHUB</div>
      <div class="value">github.com/zordan-filippo</div>
    </div>
  </div>

  <div class="contact-item">
    <div class="contact-icon">in</div>
    <div class="contact-info">
      <div class="label">// LINKEDIN</div>
      <div class="value">linkedin.com/in/zordan-filippo</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="status-line">
    <div class="dot"></div>
    SERVER ONLINE — PORTA 8080 — CONNESSIONI ATTIVE
  </div>
</div>

<footer id="clock">--:--:--</footer>

<script>
  (function tick() {
    document.getElementById('clock').textContent =
      new Date().toTimeString().slice(0, 8);
    setTimeout(tick, 1000);
  })();
</script>
</body>
</html>
